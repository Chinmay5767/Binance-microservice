spring.application.name=APIGatewayService
# Server Configuration
server.port=8080

# Public Route: Auth Service (Login, Register, Health)
spring.cloud.gateway.routes[0].id=auth-service-public
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/login,/auth/register
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args.retries=3

# Protected Route: Crypto Service (Requires JWT - Handled by Global Filter)
spring.cloud.gateway.routes[1].id=crypto-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/stream/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=20

# Logging Configuration
logging.level.com.crypto.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,gateway   
services:
  frontend:
    build: ./binance_frontend
    container_name: react-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./binance_frontend:/app      # Mount source code live
      - /app/node_modules            # Preserve container's node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true     # Fix hot reload in Docker
    command: npm start               # Use React dev server
    depends_on:
      - app
    networks:
      - my-network
    stdin_open: true
    tty: true
  api-gateway:
    build: ./api-gateway  # Adjust path to your gateway
    container_name: api-gateway
    ports:
      - "8080:8080"  # Gateway exposes port 8080 externally
    environment:
      # Gateway configuration - routes to internal services
      - APP_SERVICE_URL=http://app:8081  # If backend runs on different port
      # OR if using Spring Cloud Gateway with service discovery:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=app-service
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://app:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES[0]=Path=/api/**
    depends_on:
      - app
      # - eureka  # If using service discovery
    networks:
      - my-network
  
  app:
    build: ./Binance_backend/git/Binance
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      database:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - my-network

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  postgres_data: